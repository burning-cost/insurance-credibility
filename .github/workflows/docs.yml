name: Docs

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install insurance-credibility and pdoc
        run: |
          pip install -e . pdoc

      - name: Generate API docs
        run: |
          pdoc \
            --output-directory docs/api \
            --docformat google \
            --footer-text "insurance-credibility v$(python -c 'import insurance_credibility; print(insurance_credibility.__version__)')" \
            --edit-url "insurance_credibility=https://github.com/burning-cost/insurance-credibility/blob/master/src/insurance_credibility/" \
            insurance_credibility \
            insurance_credibility.classical \
            insurance_credibility.experience

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "docs: regenerate API reference [skip ci]"
          git push
